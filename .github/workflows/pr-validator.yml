name: "PR Hard Gatekeeper & GSSoC Labeler"

on:
  # pull_request_target runs in the context of the BASE repo so the
  # GITHUB_TOKEN has write access to issues/PRs even for fork-originated PRs.
  # This replaces `pull_request` which strips write permissions for forks.
  pull_request_target:
    types: [opened, edited, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  gatekeeper:
    timeout-minutes: 10
    if: |
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Fetch PR Details
        id: pr_info
        uses: actions/github-script@v7
        with:
          script: |
            let body = "";
            let prNumber = context.issue.number;
            
            if (context.eventName === 'pull_request_target') {
              body = context.payload.pull_request.body || "";
              prNumber = context.payload.pull_request.number;
            } else {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              body = pr.data.body || "";
            }
            core.setOutput('body', body);
            core.setOutput('number', prNumber.toString());

      - name: Detect Backend-Only Change Set
        id: change_scope
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr_info.outputs.number }}', 10);
            let files = [];
            
            try {
              files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
              });
            } catch (error) {
              core.setFailed(`Failed to list files: ${error.message}`);
              return;
            }

            // Extensions and filenames that cannot produce a visual change, so a
            // screenshot would carry no information for a reviewer.
            const NON_VISUAL_EXTENSIONS = [
              '.py', '.yml', '.yaml', '.md', '.txt', '.cfg', '.ini', '.toml', '.json', '.sql',
            ];
            const NON_VISUAL_FILENAMES = [
              'requirements.txt', 'pyproject.toml', 'setup.cfg', 'setup.py',
              '.env.example', '.gitignore', '.gitattributes', '.editorconfig',
              '.prettierrc', 'LICENSE', 'Dockerfile', 'Makefile',
            ];

            const backendOnly = files.length === 0 || files.every((file) => {
              const name = file.filename.split('/').pop();
              return (
                NON_VISUAL_EXTENSIONS.some((ext) => file.filename.endsWith(ext)) ||
                NON_VISUAL_FILENAMES.includes(name)
              );
            });

            core.setOutput('backend_only', backendOnly ? 'true' : 'false');

      - name: Validate PR Content
        id: checker
        env:
          PR_BODY: ${{ steps.pr_info.outputs.body }}
          BACKEND_ONLY: ${{ steps.change_scope.outputs.backend_only }}
        run: |
          import os, sys, re
          
          body = os.getenv('PR_BODY', '')
          backend_only = os.getenv('BACKEND_ONLY', 'false').lower() == 'true'
          errors = []
          
          # Require Issue Number Link
          match = re.search(r'(Fixes|Closes)\s*#\s*(\d+)', body, re.IGNORECASE)
          if not match:
              errors.append("- **Missing Linked Issue:** You must include a valid issue number link (e.g., `Fixes #123` or `Closes #123`).")
          else:
              with open("issue_num.txt", "w") as f:
                  f.write(match.group(2))
              
          # Hosts that serve generated filler images. An image from one of these
          # proves nothing, so it is treated as if no evidence were attached.
          PLACEHOLDER_HOSTS = (
              r'via\.placeholder\.com|placeholder\.com|placehold\.(co|it|jp)|'
              r'dummyimage\.com|placekitten\.com|fakeimg\.pl|loremflickr\.com|'
              r'baconmockup\.com|placeimg\.com'
          )

          # Require Screenshot/Visual Evidence unless the PR is backend or infrastructure only
          if not backend_only:
              image_tags = re.findall(r'!\[.*?\]\((.*?)\)|<img\s+[^>]*src=["\']?([^"\'\s>]+)', body)
              sources = [url for pair in image_tags for url in pair if url]
              real_sources = [src for src in sources if not re.search(PLACEHOLDER_HOSTS, src, re.IGNORECASE)]
              if not sources:
                  errors.append("- **Missing Screenshot/Visual Proof:** You must attach a UI screenshot or a terminal test log image.")
              elif not real_sources:
                  errors.append("- **Placeholder Screenshot Detected:** Generated filler images are not accepted. Attach a real screenshot of the change or its test output.")
          
          if errors:
              with open("errors.txt", "w") as f:
                  f.write("\n".join(errors))
              sys.exit(1)
        shell: python

      - name: Reject and Auto-Close PR
        if: failure() && github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let errors = "Unknown validation error.";
            try { errors = fs.readFileSync('errors.txt', 'utf8'); } catch (err) {}
            
            const prNumber = parseInt(${{ steps.pr_info.outputs.number }}, 10);
            const commentBody = `⚠️ **PULL REQUEST REJECTED & CLOSED** ⚠️\n\n@${context.actor}, your Pull Request has been automatically closed because it is missing core requirements:\n\n${errors}\n\n💡 **How to fix:** Edit your description, add the details and screenshot, and then **re-open** this PR!`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });
            
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              state: 'closed'
            });

      - name: Process GSSoC Rewards and Approval
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('issue_num.txt')) return;
            const issueNumber = fs.readFileSync('issue_num.txt', 'utf8').trim();
            const prNumber = parseInt(${{ steps.pr_info.outputs.number }}, 10);
            
            let labelsToAdd = ['gssoc:approved'];
            
            try {
              const issue = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issueNumber, 10)
              });
              
              const inheritedLabels = issue.data.labels
                .map(l => l.name)
                .filter(name => name.indexOf('type:') === 0 || name.indexOf('level:') === 0 || name.indexOf('quality:') === 0);
                
              labelsToAdd = labelsToAdd.concat(inheritedLabels);
              
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: labelsToAdd
              });
              console.log(`Successfully synced GSSoC Metrics: ${labelsToAdd}`);
              
            } catch (error) {
              console.log("Could not process GSSoC labels automatically: ", error.message);
            }
